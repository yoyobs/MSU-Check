<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSU 查账</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101828;
        --panel: #182232;
        --panel-2: #202b3d;
        --line: #334155;
        --text: #e5edf8;
        --muted: #9fb0c8;
        --blue: #5c8ffa;
        --green: #47d18c;
        --red: #ff6b7a;
        --yellow: #f5c451;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .nav-links {
        display: flex;
        gap: 14px;
        font-size: 14px;
      }

      .nav-links a {
        color: var(--blue);
        text-decoration: none;
      }

      .checker {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .select-button {
        width: 100%;
        min-height: 70px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f1724;
        color: var(--text);
        padding: 10px 12px;
        font-size: 15px;
        outline: none;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        text-align: left;
        cursor: pointer;
      }

      .select-button:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(92, 143, 250, 0.18);
      }

      .select-button::after {
        content: "";
        width: 9px;
        height: 9px;
        border-right: 2px solid var(--muted);
        border-bottom: 2px solid var(--muted);
        transform: rotate(45deg) translateY(-2px);
      }

      .custom-select {
        position: relative;
      }

      .select-text,
      .transaction-main {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .select-name,
      .transaction-title {
        color: var(--text);
        font-weight: 700;
        line-height: 1.3;
      }

      .select-address,
      .transaction-sub,
      .transaction-hash {
        color: var(--muted);
        font-family: Consolas, "SFMono-Regular", monospace;
        font-size: 12px;
        line-height: 1.4;
        word-break: break-all;
      }

      .select-menu {
        position: absolute;
        z-index: 10;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        display: none;
        max-height: 320px;
        overflow: auto;
        background: #0f1724;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        padding: 6px;
      }

      .custom-select.open .select-menu {
        display: grid;
        gap: 4px;
      }

      .option {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        padding: 10px;
        cursor: pointer;
        text-align: left;
      }

      .option:hover,
      .option.active {
        background: var(--panel-2);
      }

      .option .select-name {
        margin-bottom: 4px;
      }

      .empty-options {
        padding: 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .actions {
        grid-column: span 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 4px;
      }

      button.primary {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        background: var(--blue);
        color: white;
        padding: 0 22px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .result {
        display: none;
        margin-top: 18px;
        border-radius: 8px;
        padding: 18px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .result.visible {
        display: block;
      }

      .result.found {
        border-color: rgba(71, 209, 140, 0.5);
      }

      .result.missing {
        border-color: rgba(255, 107, 122, 0.45);
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 20px;
        font-weight: 700;
      }

      .dot {
        flex: 0 0 auto;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--yellow);
      }

      .found .dot {
        background: var(--green);
      }

      .missing .dot {
        background: var(--red);
      }

      .transactions {
        display: grid;
        gap: 10px;
      }

      .transaction {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1724;
        text-decoration: none;
      }

      .transaction:hover {
        border-color: rgba(92, 143, 250, 0.7);
      }

      .transaction-amount {
        color: var(--green);
        font-size: 18px;
        font-weight: 700;
        white-space: nowrap;
      }

      .summary {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 14px;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1080px);
          padding: 28px 0;
        }

        .topbar,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .nav-links {
          flex-wrap: wrap;
        }

        form {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-column: auto;
        }

        button.primary {
          width: 100%;
        }

        .transaction {
          grid-template-columns: 1fr;
        }

        .transaction-amount {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>MSU 查账</h1>
        <nav class="nav-links" aria-label="页面导航">
          <a href="/address-book.xlsx">下载地址名单</a>
          <a href="https://msu-explorer.xangle.io/" target="_blank" rel="noreferrer">打开 Explorer</a>
        </nav>
      </div>

      <section class="checker">
        <form id="checker-form">
          <div class="field">
            <span>发送者的地址</span>
            <div class="custom-select" data-role="sender">
              <button class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="select-text">
                  <span class="select-name">请选择发送者</span>
                  <span class="select-address">从地址名单 Excel 读取</span>
                </span>
              </button>
              <div class="select-menu" role="listbox"></div>
            </div>
          </div>

          <div class="field">
            <span>接收者的地址</span>
            <div class="custom-select" data-role="receiver">
              <button class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="select-text">
                  <span class="select-name">请选择接收者</span>
                  <span class="select-address">从地址名单 Excel 读取</span>
                </span>
              </button>
              <div class="select-menu" role="listbox"></div>
            </div>
          </div>

          <div class="actions">
            <span class="hint">选择发送者和接收者后，只查询这两个地址之间最近 2 笔交易。</span>
            <button id="submit" class="primary" type="submit">查询最近交易</button>
          </div>
        </form>

        <div id="result" class="result" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector('#checker-form');
      const button = document.querySelector('#submit');
      const result = document.querySelector('#result');
      const selects = {
        sender: document.querySelector('[data-role="sender"]'),
        receiver: document.querySelector('[data-role="receiver"]'),
      };

      const state = {
        addresses: [],
        sender: null,
        receiver: null,
      };

      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');

      const renderSelected = (role) => {
        const root = selects[role];
        const buttonText = root.querySelector('.select-text');
        const item = state[role];

        if (!item) {
          buttonText.innerHTML = `
            <span class="select-name">${role === 'sender' ? '请选择发送者' : '请选择接收者'}</span>
            <span class="select-address">从地址名单 Excel 读取</span>
          `;
          return;
        }

        buttonText.innerHTML = `
          <span class="select-name">${escapeHtml(item.nickname)}</span>
          <span class="select-address">${escapeHtml(item.address)}</span>
        `;
      };

      const closeMenus = (except) => {
        Object.values(selects).forEach((root) => {
          if (root === except) return;
          root.classList.remove('open');
          root.querySelector('.select-button').setAttribute('aria-expanded', 'false');
        });
      };

      const selectAddress = (role, id) => {
        state[role] = state.addresses.find((item) => item.id === id) || null;
        renderSelected(role);
        closeMenus();
        result.className = 'result';
        result.innerHTML = '';
      };

      const renderOptions = () => {
        Object.entries(selects).forEach(([role, root]) => {
          const menu = root.querySelector('.select-menu');

          if (!state.addresses.length) {
            menu.innerHTML = '<div class="empty-options">暂无地址，请更新 data/address-book.xlsx。</div>';
            renderSelected(role);
            return;
          }

          menu.innerHTML = state.addresses.map((item) => {
            const active = state[role]?.id === item.id ? ' active' : '';
            return `
              <button class="option${active}" type="button" role="option" data-id="${escapeHtml(item.id)}">
                <div class="select-name">${escapeHtml(item.nickname)}</div>
                <div class="select-address">${escapeHtml(item.address)}</div>
              </button>
            `;
          }).join('');

          menu.querySelectorAll('.option').forEach((option) => {
            option.addEventListener('click', () => selectAddress(role, option.dataset.id));
          });

          renderSelected(role);
        });
      };

      const loadAddressBook = async () => {
        try {
          const response = await fetch('/api/address-book');
          const data = await response.json();
          state.addresses = Array.isArray(data.addresses) ? data.addresses : [];
          state.sender = state.addresses[0] || null;
          state.receiver = state.addresses[1] || state.addresses[0] || null;
          renderOptions();
        } catch (error) {
          result.className = 'result visible missing';
          result.innerHTML = '<div class="status"><span class="dot"></span>地址列表读取失败，请刷新页面重试。</div>';
        }
      };

      Object.entries(selects).forEach(([role, root]) => {
        const selectButton = root.querySelector('.select-button');
        selectButton.addEventListener('click', () => {
          const willOpen = !root.classList.contains('open');
          closeMenus(root);
          root.classList.toggle('open', willOpen);
          selectButton.setAttribute('aria-expanded', String(willOpen));
          renderOptions();
        });
      });

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.custom-select')) closeMenus();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenus();
      });

      const renderTransactions = (data) => {
        result.className = `result visible ${data.found ? 'found' : 'missing'}`;

        if (!data.found) {
          result.innerHTML = `
            <div class="status"><span class="dot"></span>${escapeHtml(data.message || '还没收到钱')}</div>
            <div class="summary">已检查 ${escapeHtml(data.checked?.transactions || 0)} 笔交易。</div>
          `;
          return;
        }

        const items = data.transactions.map((trx, index) => `
          <a class="transaction" href="${escapeHtml(trx.explorerUrl)}" target="_blank" rel="noreferrer">
            <span class="transaction-main">
              <span class="transaction-title">第 ${index + 1} 笔 · ${escapeHtml(trx.age || '时间未知')}</span>
              <span class="transaction-sub">区块 ${escapeHtml(trx.blockNumber || '-')}</span>
              <span class="transaction-hash">${escapeHtml(trx.hash)}</span>
            </span>
            <span class="transaction-amount">${escapeHtml(trx.amount)} NXPC</span>
          </a>
        `).join('');

        result.innerHTML = `
          <div class="status"><span class="dot"></span>${escapeHtml(data.message || '已找到最近交易')}</div>
          <div class="summary">显示最近 ${data.transactions.length} 笔匹配交易，已检查 ${escapeHtml(data.checked?.transactions || 0)} 笔。</div>
          <div class="transactions">${items}</div>
        `;
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!state.sender || !state.receiver) {
          result.className = 'result visible missing';
          result.innerHTML = '<div class="status"><span class="dot"></span>请先选择发送者和接收者。</div>';
          return;
        }

        button.disabled = true;
        button.textContent = '查询中...';
        result.className = 'result visible';
        result.innerHTML = '<div class="status"><span class="dot"></span>正在查询最近交易</div>';

        try {
          const response = await fetch('/api/recent-transactions', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              sender: state.sender.address,
              receiver: state.receiver.address,
            }),
          });

          const data = await response.json();
          renderTransactions(data);
        } catch (error) {
          result.className = 'result visible missing';
          result.innerHTML = '<div class="status"><span class="dot"></span>查询失败，请稍后再试。</div>';
        } finally {
          button.disabled = false;
          button.textContent = '查询最近交易';
        }
      });

      loadAddressBook();
    </script>
  </body>
</html>
