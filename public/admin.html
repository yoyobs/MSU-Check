<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSU 查账后台</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101828;
        --panel: #182232;
        --panel-2: #202b3d;
        --line: #334155;
        --text: #e5edf8;
        --muted: #9fb0c8;
        --blue: #5c8ffa;
        --green: #47d18c;
        --red: #ff6b7a;
        --yellow: #f5c451;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        align-items: end;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f1724;
        color: var(--text);
        padding: 10px 12px;
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(92, 143, 250, 0.18);
      }

      .button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        background: var(--blue);
        color: white;
        padding: 0 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      .button.secondary {
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .button.danger {
        background: transparent;
        border: 1px solid rgba(255, 107, 122, 0.6);
        color: var(--red);
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .table {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(160px, 0.7fr) minmax(260px, 1.3fr) auto;
        gap: 10px;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1724;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .message {
        display: none;
        margin-top: 16px;
        border-radius: 8px;
        padding: 14px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
      }

      .message.visible {
        display: block;
      }

      .message.success {
        border-color: rgba(71, 209, 140, 0.5);
      }

      .message.error {
        border-color: rgba(255, 107, 122, 0.5);
      }

      .note {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 24px, 1080px);
          padding: 28px 0;
        }

        .topbar,
        .toolbar,
        .row {
          grid-template-columns: 1fr;
        }

        .topbar {
          display: grid;
          align-items: stretch;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>MSU 查账后台</h1>
        <a href="/">返回查账页面</a>
      </div>

      <section class="panel">
        <p class="note">
          这里维护主页两个下拉列表共用的地址簿。每一项包含昵称和地址，主页下拉框会显示昵称在上、地址在下。
        </p>

        <div class="toolbar">
          <label>
            管理密码
            <input id="password" type="password" autocomplete="current-password" placeholder="查看 data/admin-password.txt">
          </label>
          <button id="add" class="button secondary" type="button">新增一项</button>
          <button id="save" class="button" type="button">保存列表</button>
        </div>

        <div id="table" class="table" aria-live="polite"></div>
        <div id="message" class="message"></div>
      </section>
    </main>

    <script>
      const table = document.querySelector('#table');
      const message = document.querySelector('#message');
      const passwordInput = document.querySelector('#password');
      const addButton = document.querySelector('#add');
      const saveButton = document.querySelector('#save');

      const state = {
        addresses: [],
      };

      const createId = () => Math.random().toString(16).slice(2) + Date.now().toString(16);

      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');

      const showMessage = (text, type = 'success') => {
        message.className = `message visible ${type}`;
        message.textContent = text;
      };

      const collectRows = () => {
        state.addresses = Array.from(table.querySelectorAll('.row')).map((row) => ({
          id: row.dataset.id || createId(),
          nickname: row.querySelector('[data-field="nickname"]').value.trim(),
          address: row.querySelector('[data-field="address"]').value.trim(),
        }));
      };

      const render = () => {
        if (!state.addresses.length) {
          table.innerHTML = '<div class="empty">暂无地址，点击“新增一项”开始添加。</div>';
          return;
        }

        table.innerHTML = state.addresses.map((item) => `
          <div class="row" data-id="${escapeHtml(item.id || createId())}">
            <label>
              昵称
              <input data-field="nickname" value="${escapeHtml(item.nickname)}" placeholder="例如 张三">
            </label>
            <label>
              地址
              <input data-field="address" value="${escapeHtml(item.address)}" placeholder="0x...">
            </label>
            <button class="button danger" type="button" data-action="delete">删除</button>
          </div>
        `).join('');

        table.querySelectorAll('[data-action="delete"]').forEach((button) => {
          button.addEventListener('click', () => {
            collectRows();
            state.addresses = state.addresses.filter((item) => item.id !== button.closest('.row').dataset.id);
            render();
          });
        });
      };

      const loadAddressBook = async () => {
        try {
          const response = await fetch('/api/address-book');
          const data = await response.json();
          state.addresses = Array.isArray(data.addresses) ? data.addresses : [];
          render();
        } catch (error) {
          showMessage('地址列表读取失败，请刷新页面重试。', 'error');
        }
      };

      const saveAddressBook = async () => {
        collectRows();

        const invalid = state.addresses.find((item) => !item.nickname || !/^0x[a-fA-F0-9]{40}$/.test(item.address));
        if (invalid) {
          showMessage('请检查每一项：昵称不能为空，地址必须是 0x 开头的 40 位地址。', 'error');
          return;
        }

        saveButton.disabled = true;
        saveButton.textContent = '保存中...';

        try {
          const response = await fetch('/api/admin/address-book', {
            method: 'PUT',
            headers: {
              'content-type': 'application/json',
              'x-admin-password': passwordInput.value,
            },
            body: JSON.stringify({ addresses: state.addresses }),
          });
          const data = await response.json();

          if (!response.ok) {
            showMessage(data.message || '保存失败。', 'error');
            return;
          }

          state.addresses = data.addresses || state.addresses;
          render();
          showMessage(data.message || '地址列表已保存。');
        } catch (error) {
          showMessage('保存失败，请稍后再试。', 'error');
        } finally {
          saveButton.disabled = false;
          saveButton.textContent = '保存列表';
        }
      };

      addButton.addEventListener('click', () => {
        collectRows();
        state.addresses.push({
          id: createId(),
          nickname: '',
          address: '',
        });
        render();
      });

      saveButton.addEventListener('click', saveAddressBook);

      loadAddressBook();
    </script>
  </body>
</html>
